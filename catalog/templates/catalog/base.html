<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korkmaz Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

   <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" href="/">Kormkaz Shop</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <form action="{% url 'index' %}" method="GET" class="d-flex ms-auto me-auto mt-2 mt-lg-0" style="max-width: 400px; width: 100%;">
                        <input type="text" 
                            name="q" 
                            class="form-control form-control-sm me-2" 
                            placeholder="Ürün ara..." 
                            value="{{ request.GET.q }}">
                        <button class="btn btn-outline-light btn-sm" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                        {% if request.GET.q %}
                            <a href="{% url 'index' %}" class="btn btn-outline-danger btn-sm ms-2">X</a>
                        {% endif %}
                    </form>

                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item me-3">
                            <a class="nav-link text-warning" href="{% url 'cart_summary' %}">
                                <i class="bi bi-cart"></i> Sepet 
                                <span class="badge bg-danger">{{ cart|length }}</span>
                            </a>
                        </li>

                        {% if user.is_authenticated %}
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle text-light" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                                    Merhaba, {{ user.username }}
                                </a>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li>
                                        <form action="{% url 'logout' %}" method="post" class="px-3">
                                            {% csrf_token %}
                                            <button type="submit" class="btn btn-danger btn-sm w-100">Çıkış Yap</button>
                                        </form>
                                    </li>
                                </ul>
                            </li>
                        {% else %}
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'login' %}">Giriş</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link btn btn-primary btn-sm text-white ms-lg-2" href="{% url 'register' %}">Kayıt Ol</a>
                            </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
